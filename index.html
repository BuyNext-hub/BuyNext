<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BuyNext</title>

<style>
body{
margin:0;
font-family:Arial,sans-serif;
background:#f5f5f5;
}

header{
background:#111827;
color:white;
text-align:center;
padding:20px;
}

.container{
max-width:900px;
margin:auto;
padding:20px;
}

.search{
text-align:center;
margin-bottom:20px;
}

.search input{
width:70%;
padding:12px;
font-size:16px;
border-radius:8px;
border:1px solid #ccc;
}

.categories{
text-align:center;
margin-bottom:30px;
}

.categories button{
padding:10px 20px;
margin:5px;
border:none;
background:#f59e0b;
color:white;
border-radius:6px;
cursor:pointer;
}

.card{
background:white;
padding:20px;
border-radius:10px;
text-align:center;
box-shadow:0 2px 10px rgba(0,0,0,.1);
}

.card img{
width:220px;
}

.card h2{
margin:15px 0;
}

.card a button{
padding:12px 25px;
background:#f59e0b;
color:white;
border:none;
border-radius:6px;
cursor:pointer;
font-size:16px;
}
</style>

</head>

<body>

<header>
<h1>BuyNext</h1>
<p>Find the Best Deals Online</p>
</header>

<div class="container">

<div class="search">
<input type="text" placeholder="Search Products...">
</div>

<div class="categories">
<button>Amazon</button>
<button>WarriorPlus</button>
<button>ZVZU</button>
</div>

<div class="card">

<img src="https://via.placeholder.com/220x220.png?text=Product">

<h2>Product Name</h2>

<p>⭐⭐⭐⭐⭐</p>

<p>$49.99</p>

<a href="https://warriorplus.com/o2/a/qx9vwm3/0" target="_blank">
<button>View Deal</button>
</a>

</div>

</div>

</body>
</html>
